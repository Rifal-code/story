<!DOCTYPE html>
<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="/favicon.png" />
    <title>Story App</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script type="module" src="/scripts/index.js"></script>
  </head>
  <body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col">
    <!-- Skip to content -->
    <a href="#main-content" class="absolute top-[-100px] left-0 bg-yellow-400 text-black px-4 py-2 z-50 focus:top-0 transition-all">Skip to Content</a>

    <!-- Header dengan gaya ala Saweria (kuning/putih shadow) -->
    <header class="bg-white shadow-sm sticky top-0 z-40">
      <div class="container mx-auto px-4 py-3 flex justify-between items-center max-w-5xl">
        <a class="brand-name text-2xl font-extrabold text-gray-900 tracking-tight" href="#/">
          Story<span class="text-yellow-400">App</span>
        </a>

        <nav id="navigation-drawer" class="navigation-drawer hidden md:block">
          <ul id="nav-list" class="nav-list flex flex-col md:flex-row gap-4 md:items-center p-4 md:p-0">
            <!-- Akan diisi dinamis oleh JS berdasarkan auth state -->
            <li><a href="#/" class="font-medium hover:text-yellow-500 transition-colors">Beranda</a></li>
            <li id="nav-login"><a href="#/login" class="font-medium hover:text-yellow-500 transition-colors">Login</a></li>
            <li id="nav-register"><a href="#/register" class="bg-yellow-400 text-black px-4 py-2 rounded-full font-bold hover:bg-yellow-500 transition-colors inline-block">Register</a></li>
          </ul>
        </nav>

        <button id="drawer-button" class="md:hidden drawer-button text-3xl focus:outline-none" aria-label="Menu" aria-expanded="false">
          ☰
        </button>
      </div>
    </header>

    <main id="main-content" class="main-content flex-grow container mx-auto px-4 py-8 max-w-5xl">
      <!-- Konten dirender di sini -->
    </main>

    <footer class="bg-white border-t border-gray-200 mt-auto py-6">
      <div class="container mx-auto px-4 text-center text-gray-500 text-sm">
        <p>&copy; 2026 Story App - Dibuat untuk Dicoding Web Intermediate</p>
      </div>
    </footer>
  </body>
</html>
