<!DOCTYPE html>
<html lang="en">

<head>
  <meta http-equiv="Content-Type" content="text/html;charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="shortcut icon" href="/favicon.png" />
  <title>Story App</title>
  <!-- Google Fonts: Quicksand -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script type="module" src="/scripts/index.js"></script>
</head>

<body class="bg-white text-black font-sans min-h-screen flex flex-col selection:bg-yellow-300 selection:text-black">
  <!-- Skip to content -->
  <a href="#main-content"
    class="absolute top-[-100px] left-0 bg-yellow-400 text-black border-2 border-black shadow-[4px_4px_0_0_#000] px-4 py-2 z-50 focus:top-4 focus:left-4 transition-all font-bold">Skip
    to Content</a>

  <div class="bg-yellow-400 border-b-2 border-black py-1 px-4 text-center text-sm font-bold truncate">
    🚀 Selamat datang di StoryApp! Bagikan cerita menarikmu hari ini.
  </div>

  <header class="bg-white border-b-2 border-black sticky top-0 z-40">
    <div class="container mx-auto px-4 py-4 flex justify-between items-center max-w-5xl">
      <a class="brand-name text-3xl font-bold tracking-tight text-black" href="#/">
        story.co
      </a>

      <nav id="navigation-drawer"
        class="navigation-drawer hidden md:block absolute md:static top-[70px] left-0 w-full md:w-auto bg-white border-b-2 border-black md:border-none shadow-[4px_4px_0_0_#000] md:shadow-none p-6 md:p-0">
        <ul id="nav-list" class="nav-list flex flex-col md:flex-row gap-6 md:gap-4 md:items-center">
          <li><a href="#/" class="bg-white border-2 border-black shadow-[4px_4px_0_0_#000] text-black px-4 py-2 rounded-xl font-bold hover:translate-y-[2px] hover:translate-x-[2px] hover:shadow-[2px_2px_0_0_#000] transition-all inline-block">Beranda</a></li>
          <li id="nav-login"><a href="#/login" class="bg-white border-2 border-black shadow-[4px_4px_0_0_#000] text-black px-4 py-2 rounded-xl font-bold hover:translate-y-[2px] hover:translate-x-[2px] hover:shadow-[2px_2px_0_0_#000] transition-all inline-block">Login</a>
          </li>
          <li id="nav-register"><a href="#/register"
              class="bg-yellow-400 border-2 border-black shadow-[4px_4px_0_0_#000] hover:shadow-[2px_2px_0_0_#000] hover:translate-x-[2px] hover:translate-y-[2px] text-black px-4 py-2 rounded-xl font-bold transition-all inline-block">Register</a>
          </li>
        </ul>
      </nav>

      <button id="drawer-button" class="md:hidden drawer-button text-3xl focus:outline-none" aria-label="Menu"
        aria-expanded="false">
        ☰
      </button>
    </div>
  </header>

  <main id="main-content" class="main-content flex-grow container mx-auto px-4 py-8 max-w-5xl">
  </main>

  <footer class="bg-white border-t-2 border-black mt-auto py-6">
    <div class="container mx-auto px-4 text-center text-black font-bold text-sm">
      <p>&copy; 2026 story.co - Dicoding Submission</p>
    </div>
  </footer>
</body>

</html>
